<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar Sesión — CAMU Novedades</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1F3864 0%, #2E5FA3 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      width: 100%; max-width: 400px;
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.35);
    }
    .login-header {
      background: #1F3864; color: #fff;
      padding: 32px 32px 24px;
      text-align: center;
    }
    .login-header h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
    .login-header p { opacity: .75; font-size: .9rem; margin-top: 6px; }
    .login-body { background: #fff; padding: 32px; }
    .btn-login {
      background: #1F3864; color: #fff;
      width: 100%; padding: 10px;
      font-size: 1rem; font-weight: 600;
      border: none; border-radius: 8px;
    }
    .btn-login:hover { background: #2E5FA3; color: #fff; }
    .form-control:focus { border-color: #2E5FA3; box-shadow: 0 0 0 3px rgba(46,95,163,.2); }
    .footer-note { text-align: center; color: #aaa; font-size: .78rem; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <i class="bi bi-building" style="font-size:2.5rem;"></i>
      <h1>CAMU Novedades</h1>
      <p>Sistema de Consolidación de Nómina</p>
    </div>
    <div class="login-body">
      {% if error %}
      <div class="alert alert-danger d-flex align-items-center mb-3 py-2">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <small>{{ error }}</small>
      </div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuario</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario" autofocus required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
          </div>
        </div>
        <button type="submit" class="btn btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
        </button>
      </form>
      <p class="footer-note mt-3">Grupo CAMU &copy; {{ 2024 }} — Uso interno</p>
    </div>
  </div>
</body>
</html>
